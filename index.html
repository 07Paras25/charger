<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Charger</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #000; }

    #ui-top {
      position: fixed; top: 16px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #fff;
      padding: 10px 24px; border-radius: 24px;
      font-size: 14px; font-family: sans-serif;
      z-index: 9999; pointer-events: none;
    }

    #info-card {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%);
      background: #fff; border-radius: 20px;
      padding: 16px 32px; text-align: center;
      font-family: sans-serif;
      z-index: 9999; display: none;
      min-width: 220px;
    }

    .name { font-size: 20px; font-weight: bold; color: #e65c00; }
    .desc { font-size: 13px; color: #666; margin-top: 4px; }
  </style>
</head>

<body>

<div id="ui-top">📷 image pe camera point karo</div>

<div id="info-card">
  <div class="name">Charger</div>
  <div class="desc">45W Fast Charging</div>
</div>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-assets>
    <a-asset-item id="chargerModel" src="./charger2.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- FIX 1: scale bada kiya -->
    <!-- FIX 2: animation-mixer added -->
    <a-gltf-model
      src="#chargerModel"
      position="0 0 0"
      scale="2 2 2"
      animation-mixer>
    </a-gltf-model>

  </a-entity>

</a-scene>

<script>
  const target = document.querySelector('[mindar-image-target]');
  const card = document.getElementById('info-card');
  const ui = document.getElementById('ui-top');

  target.addEventListener('targetFound', () => {
    card.style.display = 'block';
    ui.textContent = '✅ Charger detect ho gaya!';
  });

  target.addEventListener('targetLost', () => {
    card.style.display = 'none';
    ui.textContent = '📷 image pe camera point karo';
  });
</script>

</body>
</html>
