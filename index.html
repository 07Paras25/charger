<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Charger</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; background: black; }

    #ui-top {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-family: sans-serif;
      font-size: 14px;
      z-index: 9999;
    }

    #info-card {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 16px 28px;
      border-radius: 18px;
      text-align: center;
      font-family: sans-serif;
      display: none;
      z-index: 9999;
    }

    .name { font-size: 18px; font-weight: bold; color: #e65c00; }
    .desc { font-size: 13px; color: #666; }
  </style>
</head>

<body>

<div id="ui-top">📷 Image pe camera point karo</div>

<div id="info-card">
  <div class="name">Charger</div>
  <div class="desc">45W Fast Charging</div>
</div>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <!-- 🔥 LIGHTING FIX -->
  <a-light type="ambient" intensity="1.1" color="#ffffff"></a-light>
  <a-light type="directional" position="2 3 1" intensity="1.6"></a-light>

  <a-assets>
    <a-asset-item id="chargerModel" src="./charger2.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- 🔥 FINAL STABLE MODEL -->
    <a-gltf-model
      src="#chargerModel"
      position="0 -0.15 0"
      scale="10 10 10"
      animation-mixer
      material="transparent: true; opacity: 1">
    </a-gltf-model>

  </a-entity>

</a-scene>

<script>
  const target = document.querySelector('[mindar-image-target]');
  const card = document.getElementById('info-card');
  const ui = document.getElementById('ui-top');

  target.addEventListener('targetFound', () => {
    card.style.display = 'block';
    ui.textContent = '✅ Charger detect ho gaya!';
  });

  target.addEventListener('targetLost', () => {
    card.style.display = 'none';
    ui.textContent = '📷 Image pe camera point karo';
  });
</script>

</body>
</html>
